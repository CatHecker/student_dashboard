<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Мои финансы</title>
  <link rel="stylesheet" href="src/card.css">
  <link rel="stylesheet" href="src/header.css">
  <link rel="stylesheet" href="/src/style.css" />
  <link rel="stylesheet" href="/src/table.css" />
  <link rel="shortcut icon" href="assets/logo.png" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />
</head>

<body>

  <!--Шапка-->
  <header id="site-header">
    <div class="header-container">
      <a href="#" class="logo">
        <div class="logo-symbol"></div>
        <div class="logo-text">Мои <span>Финансы</span></div>
      </a>
      <nav>
        <button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#exampleModal">
            Добавить транзакцию
          </button>
      </nav>
    </div>
  </header>

  <!--Карточка с доходами-->
  <div class="card-container">

    <div class="card-price income_color" id="income-card">
      <h3>Доходы</h3>
      <p class="card-price__value" style="color: rgb(11, 237, 11)">₽0</p>
    </div>

    <!--Карточка с балансом-->
    <div class="card-price balance_color" id="balance-card">
      <h3>Баланс</h3>
      <p class="card-price__value" style="color: blue">₽0</p>
    </div>

    <!--Карточка с расходами-->
    <div class="card-price expenses_color" id="expenses-card">
      <h3>Расходы</h3>
      <p class="card-price__value" style="color: red">₽0</p>
    </div>
  </div>

  <!-- Модальное окно -->
  <div class="modal fade" id="exampleModal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h1 class="modal-title fs-5" id="exampleModalLabel">Modal title</h1>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
<form>
        <div class="modal-body">
          <div class="mb-3">
            <label for="select" class="form-label">Тип транзакции</label>
            <select type="type" id="select" class="form-select">
              <option>Доход</option>
              <option>Расход</option>
            </select>
            <label for="exampleFormControlInput1" class="form-label" required>Сумма</label>
            <input name="sum" type="number" class="form-control" id="exampleFormControlInput1" />
            <label for="select" class="form-label">Категория</label>
            <select id="select" name="category" class="form-select">
              <option>Еда</option>
              <option>Транспорт</option>
              <option>Развлечения</option>
              <option>Учёба</option>
              <option>Другое</option>
            </select>
            <div class="mb-3">
              <label for="exampleFormControlTextarea1" class="form-label">Комментарий</label>
              <textarea name="description" class="form-control" id="exampleFormControlTextarea1" rows="3"></textarea>
            </div>
          </div>
        </div>
</form>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
          <button type="button" class="btn btn-primary" onclick="">Save changes</button>
        </div>
      </div>
    </div>
  </div>
  <div class="modal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Modal title</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
      </div>
    </div>
    </section>

    <script src="src/main.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"></script>

</body>

</html>
